[project]
name = "tlmtc"
version = "0.0.1"
description = "Transfer Learning for Multi-Label Text Classification"
readme = "README.md"
license = { file = "LICENSE.md" }
requires-python = ">=3.12"
dependencies = [
    "datasets ~= 4.4",
    "iterative-stratification ~= 0.1",
    "numpy ~= 2.3",
    "optuna ~= 4.6",
    "pandas ~= 2.2",
    "pyarrow ~= 22.0",
    "scikit-learn ~= 1.7",
    "transformers ~= 4.57"
]

[project.optional-dependencies]
peft = ["peft ~= 0.18"]
torch = ["torch ~= 2.9"]
test = ["pytest>=9.0"]
lint = [
    "ruff>=0.14",
    "mypy>=1.19"
]

[project.scripts]
tlmtc = "tlmtc.cli:main"

[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "D"]

[tool.ruff.lint.pydocstyle]
convention = "google"
ignore-var-parameters = true

[tool.ruff.lint.per-file-ignores]
"src/tlmtc/config.py" = ["D"]
"src/tlmtc/utils.py" = ["D"]
"src/tlmtc/data_pipeline.py" = ["D"]
"src/tlmtc/finetune_pipeline.py" = ["D"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
disallow_any_generics = false
warn_return_any = false
untyped_calls_exclude = [
    "transformers",
]

[[tool.mypy.overrides]]
module = ["tlmtc.training", "tlmtc.finetune_pipeline"]
disable_error_code = ["unused-ignore"]

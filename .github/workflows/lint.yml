name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint and type check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install lint-only dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e . --no-deps
        pip install ".[lint]"

    - name: Run Ruff formatter (check only)
      run: |
        ruff format --check .

    - name: Run Ruff linter
      run: |
        ruff check .

    - name: Run mypy (type checking)
      run: |
        mypy src/tlmtc


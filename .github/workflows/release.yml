name: Release

on:
  workflow_dispatch:
    inputs:
      build_package:
        description: "Run full release preflight including package build"
        required: false
        type: boolean
        default: false

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  UV_VERSION: "0.9.30"
  PYTHON_VERSION: "3.12"

jobs:
  integration-tests:
    name: Run integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Check lockfile is current
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --extra full --group test

      - name: Run integration tests
        run: uv run --frozen pytest -m integration

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push' || inputs.build_package

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Check lockfile is current
        run: uv lock --check

      - name: Build package
        run: uv build

      - name: Check build artifacts
        run: |
          echo "Built files:"
          ls -l dist/

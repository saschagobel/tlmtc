name: Release

on:
  workflow_dispatch:
    inputs:
      build_package:
        description: "Run full release preflight including package build"
        required: false
        type: boolean
        default: false

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  UV_VERSION: "0.9.30"
  PYTHON_VERSION: "3.12"

jobs:
  integration-tests:
    name: Run integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check release tag is on main
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Check lockfile is current
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --frozen --extra full --group test

      - name: Run integration tests
        run: uv run --python ${{ matrix.python-version }} --frozen pytest -m integration

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push' || inputs.build_package

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Check tag matches package version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(uv run --no-sync python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          print(pyproject["project"]["version"])
          PY
          )"

          echo "Tag version:     ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"

          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"

      - name: Check lockfile is current
        run: uv lock --check

      - name: Build package
        run: uv build

      - name: Check build artifacts
        run: |
          echo "Built files:"
          ls -l dist/

      - name: Check package metadata
        run: uvx --from twine twine check dist/*

      - name: Upload package distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish package to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/tlmtc

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  UV_VERSION: "0.9.30"
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install ${{ env.PYTHON_VERSION }}

    - name: Check lockfile is current
      run: uv lock --check

    - name: Install lint dependencies
      run: uv sync --group lint --frozen

    - name: Run Ruff formatter
      run: uv run ruff format --check .

    - name: Run Ruff linter
      run: uv run ruff check .

  type:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Check lockfile is current
        run: uv lock --check

      - name: Install type-check dependencies
        run: uv sync --group type --frozen

      - name: Run mypy
        run: uv run mypy src/tlmtc

  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Check lockfile is current
        run: uv lock --check

      - name: Install test dependencies
        run: uv sync --python ${{ matrix.python-version }} --group test --extra train --frozen

      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} --frozen pytest -q -m "not integration"

  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Check lockfile is current
        run: uv lock --check

      - name: Build package
        run: uv build

